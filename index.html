<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agape AI - Heart-to-Heart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://sf-cdn.coze.com/obj/unpkg-va/flow-platform/chat-app-sdk/0.1.0-beta.2/index.js"></script>
    <style>
        /* 1. 强制页面不滚动，确保一屏全显 */
        html, body { 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            background-color: #fdf2e9; 
            margin: 0; padding: 0;
        }

        /* 2. 核心：动态计算白框高度，确保输入框不掉出去 */
        .chat-card-container {
            height: calc(100vh - 220px); /* 扣除头部和底部的空间 */
            max-height: 600px; /* 防止超大屏下变形 */
            width: 90%;
            max-width: 900px;
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 4px 30px rgba(0,0,0,0.05);
            border: 4px solid white;
            position: relative;
            overflow: hidden; /* 关键：切断溢出 */
        }

        /* 3. 强制 Coze 内部填满容器，不留白边 */
        #coze-chat-container { height: 100% !important; width: 100% !important; }
        #coze-chat-container iframe { height: 100% !important; min-height: 100% !important; }

        .glass-nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="flex flex-col items-center">

    </header>

    <div class="chat-card-container">
        <div id="coze-chat-container"></div>
    </div>

    <footer class="mt-auto py-3 w-full text-center">
        <p class="text-[9px] text-orange-400 uppercase tracking-tighter opacity-70 px-4">

    <script>

            config: {

</body>
</html>
