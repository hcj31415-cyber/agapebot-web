<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agape - Pure Love AI</title>
    <style>
        body { margin: 0; background: #fff5f0; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .hero h1 { color: #d35400; font-size: 3rem; margin-bottom: 0.5rem; text-align: center; }
        .hero p { color: #e67e22; margin-bottom: 2rem; text-align: center; }
        
        /* 中心对话框样式 */
        #chat-window { width: 90%; max-width: 800px; background: white; border-radius: 30px; box-shadow: 0 15px 50px rgba(211, 84, 0, 0.15); display: flex; flex-direction: column; height: 60vh; }
        #chat-history { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        
        /* 气泡样式 */
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 20px; font-size: 1rem; line-height: 1.5; }
        .ai { background: #fff5f0; color: #d35400; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: #ff7e5f; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        .input-area { padding: 20px; border-top: 1px solid #fef0e8; display: flex; gap: 15px; }
        input { flex: 1; border: none; background: #fdf2eb; padding: 15px 25px; border-radius: 25px; outline: none; font-size: 1rem; }
        button { background: #ff7e5f; color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        button:hover { background: #d35400; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Agape</h1>
        <p>Talk to Unconditional Love</p>
    </div>

    <div id="chat-window">
        <div id="chat-history">
            <div class="msg ai">Hello, I am Agape. I am here to listen with love.</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message..." onkeypress="if(event.keyCode==13) sendMessage()">
            <button onclick="sendMessage()">→</button>
        </div>
    </div>

    <script>
        // 配置信息（请填入你刚才保存的 PAT）
        const PAT = 'pat_tpbdyBem1I4AdU0gNZmuVVk29l0tsz2rUkjC6cllTrKLX4ppcQnLNxoo5MtwWYhj';
        const BOT_ID = '7626718100825735173';

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const history = document.getElementById('chat-history');
            const message = input.value.trim();
            if (!message) return;

            // 1. 显示用户消息
            history.innerHTML += `<div class="msg user">${message}</div>`;
            input.value = '';
            history.scrollTop = history.scrollHeight;

            // 2. 调用 API (绕过所有 SDK 错误)
            try {
                const response = await fetch('https://api.coze.com/v3/chat', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${PAT}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        bot_id: BOT_ID,
                        user_id: "user_" + Math.random().toString(36).substring(7),
                        additional_messages: [{ role: "user", content: message, content_type: "text" }],
                        stream: false
                    })
                });

                const data = await response.json();
                // 3. 提取 AI 回复（注意：根据 Coze V3 API 结构提取）
                // 这里使用简单处理，正式版需处理轮询逻辑
                history.innerHTML += `<div class="msg ai">Agape is thinking...</div>`;
            } catch (error) {
                history.innerHTML += `<div class="msg ai" style="color:red">Error: Make sure your PAT is correct.</div>`;
            }
            history.scrollTop = history.scrollHeight;
        }
    </script>
</body>
</html>
