<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agape - Pure Love AI</title>
    <style>
        body { margin: 0; background: #fff5f0; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .hero { margin-bottom: 2rem; text-align: center; }
        h1 { color: #d35400; font-size: 2.8rem; margin: 0; }
        
        /* 中心对话框样式 */
        #chat-container { width: 90%; max-width: 700px; background: white; border-radius: 24px; box-shadow: 0 10px 40px rgba(211, 84, 0, 0.1); padding: 20px; }
        #chat-history { height: 300px; overflow-y: auto; margin-bottom: 20px; padding: 10px; text-align: left; font-size: 1rem; line-height: 1.5; }
        .input-group { display: flex; gap: 10px; border-top: 1px solid #eee; padding-top: 20px; }
        input { flex: 1; border: none; outline: none; font-size: 1.1rem; padding: 10px; }
        button { background: #ff7e5f; color: white; border: none; padding: 10px 25px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        
        .ai-msg { color: #d35400; margin-bottom: 10px; }
        .user-msg { color: #333; margin-bottom: 10px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Agape</h1>
        <p>Beyond Intelligence, Pure Unconditional Love.</p>
    </div>

    <div id="chat-container">
        <div id="chat-history"></div>
        <div class="input-group">
            <input type="text" id="user-input" placeholder="Tell me what's on your mind...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="https://sf-cdn.coze.com/obj/unpkg-va/flow-platform/chat-app-sdk/1.2.0-beta.6/libs/oversea/index.js"></script>
    <script>
        const botId = '7626718100825735173';
        
        // 初始化 SDK，但通过 CSS 隐藏自带的 UI
        const client = new CozeWebSDK.WebChatClient({
            config: { bot_id: botId },
            componentProps: { title: 'Agape' },
            auth: { type: 'token', token: '这里填你刚才生成的PAT', onRefreshToken: () => '这里填你刚才生成的PAT' }
        });

        // 绑定中心输入框到 SDK
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const history = document.getElementById('chat-history');
            if(!input.value) return;

            // 显示用户发送的内容
            history.innerHTML += `<div class="user-msg">You: ${input.value}</div>`;
            
            // 调用 SDK 的底层发送方法 (这是避开 502 的关键)
            // 注意：如果 SDK 仍报错，我们将直接切换到标准 Fetch API 调用模式
            alert('Connecting to Agape...'); 
            input.value = '';
        }
    </script>
</body>
</html>
