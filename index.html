<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://sf-cdn.coze.com/obj/unpkg-va/flow-platform/chat-app-sdk/0.1.0-beta.2/index.js"></script>
    <style>
        /* 强制锁定全屏高度 */
        html, body { 
            height: 100vh; 
            width: 100vw; 
            margin: 0; padding: 0;
            overflow: hidden; 
            background-color: #fdf2e9; /* 您最满意的淡橙背景 */
        }

        /* 极简玻璃导航栏 */
        .nav-bar {
            height: 60px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        /* 主容器 */
        .wrapper {
            height: calc(100vh - 60px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 20px;
        }

        /* 标题组 */
        .title-box { text-align: center; margin: 2rem 0; flex-shrink: 0; }
        .main-title { font-size: 3rem; font-weight: 800; color: #c2410c; }
        .sub-title { color: #c2410c; opacity: 0.7; font-style: italic; }

        /* 核心白框：关键修改点 */
        .chat-frame {
            width: 90%;
            max-width: 1000px;
            background: white;
            border-radius: 2rem;
            border: 8px solid white; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            flex-grow: 1; /* 自动占据剩余所有空间 */
            margin-bottom: 1rem;
            position: relative;
            /* 移除之前的 overflow:hidden 确保不会挡住发送按钮 */
        }

        /* 强制锁定 Coze 高度填充 */
        #coze-chat-container { height: 100% !important; width: 100% !important; }
        #coze-chat-container iframe { height: 100% !important; width: 100% !important; border: none; }

        /* 升级按钮 */
        .btn-upgrade {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white; padding: 8px 20px; border-radius: 99px;
            font-weight: bold; text-decoration: none; font-size: 14px;
        }

        /* 底部声明 */
        footer { font-size: 10px; color: #c2410c; opacity: 0.6; text-align: center; flex-shrink: 0; padding-bottom: 10px; }
    </style>
</head>
<body class="flex flex-col">

            <div class="flex justify-center gap-4 mt-1">

                <span>•</span>
                <a href="mailto:admin@agapebot.com" class="hover:underline">admin@agapebot.com</a>
            </div>
        </footer>
    </div>

    <script>
        new CozeWebChat.ChatClient({

</body>
